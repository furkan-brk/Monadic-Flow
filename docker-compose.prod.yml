# docker-compose.prod.yml — Monad Testnet overlay
#
# Kullanım:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
#
# Gereksinim: .env dosyasında gerçek Monad Testnet değerleri olmalı:
#   RPC_URL=https://testnet-rpc.monad.xyz
#   CONTRACT_ADDRESS=0x<forge script --broadcast çıktısından>
#   PRIVATE_KEY=0x<gerçek imzalama anahtarı — ASLA commit etme>
#   BESS_ADDRESS=0x<gerçek BESS adresi>
#   INTERNAL_TOKEN=<güçlü rastgele değer>

services:
  backend:
    restart: always

  energy:
    restart: always
