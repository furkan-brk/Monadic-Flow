# ParallelPulse — Docker Compose
#
# ─── Kullanım ──────────────────────────────────────────────────────────────────
#
#  Dev modu  (local Anvil EVM):
#    1. .env dosyasında: RPC_URL=http://anvil:8545
#    2. docker compose --profile dev up --build
#
#  Prod modu (Monad Testnet):
#    1. .env dosyasında: RPC_URL=https://testnet-rpc.monad.xyz
#    2. docker compose up --build
#    VEYA overlay ile:
#    docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
#
# ─── Tek .env dosyası ─────────────────────────────────────────────────────────
#   Tüm servisler proje kökündeki .env'i okur.
#   Değişkenler: RPC_URL, CONTRACT_ADDRESS, PRIVATE_KEY, BESS_ADDRESS,
#                INTERNAL_TOKEN, SOC_PUSH_INTERVAL_S, HOST, PORT
#   Bkz: .env.example

networks:
  parallelpulse-net:
    driver: bridge

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # DEV ONLY ─ Local EVM node (Anvil)
  # ═══════════════════════════════════════════════════════════════════════════
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--chain-id"
      - "1337"
      - "--block-time"
      - "2"
      - "--accounts"
      - "10"
      - "--balance"
      - "10000"
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 4s
      retries: 12
      start_period: 5s
    networks:
      - parallelpulse-net
    profiles: ["dev"]

  # ═══════════════════════════════════════════════════════════════════════════
  # DEV ONLY ─ One-shot contract deployer
  #   RPC_URL hardcode: deployer DAIMA Anvil'e bağlanır (http://anvil:8545).
  #   PRIVATE_KEY root .env'den okunur.
  # ═══════════════════════════════════════════════════════════════════════════
  deployer:
    build:
      context: contracts
      dockerfile: Dockerfile.deployer
    env_file:
      - .env
    environment:
      # Deployer her zaman yerel Anvil'e deploy eder (testnet .env değerini override eder)
      - RPC_URL=http://anvil:8545
    depends_on:
      anvil:
        condition: service_healthy
    networks:
      - parallelpulse-net
    profiles: ["dev"]
    restart: "no"

  # ═══════════════════════════════════════════════════════════════════════════
  # Backend ─ FastAPI WebSocket relay
  #   Tüm değişkenler root .env'den gelir.
  # ═══════════════════════════════════════════════════════════════════════════
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      deployer:
        condition: service_completed_successfully
        required: false   # dev profile aktif değilse yok sayılır
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 12s
    networks:
      - parallelpulse-net
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  # Energy ─ Python simulation runner (demo mode)
  #   BACKEND_URL: Docker içi servis adı — .env'deki localhost değerini override eder.
  # ═══════════════════════════════════════════════════════════════════════════
  energy:
    build:
      context: energy
      dockerfile: Dockerfile.parallelpulse
    env_file:
      - .env
    environment:
      # Docker servis adı routing — .env'deki http://localhost:8000 değerini override eder
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - parallelpulse-net
    restart: unless-stopped
